<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
  <title>GifBoard</title>
  <link rel="stylesheet" href="../fonts.css" />
  <link rel="stylesheet" href="../theme.css" />
  <script src="../theme-apply.js"></script>
  <style>
    /* base layout (body/header/main/footer/.hbtn/.muted/.btn/.modal) is shared in theme.css */

    /* toolbar */
    .toolbar { padding: 12px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--divider); }
    .search { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--input); border: 1px solid var(--border);
      border-radius: 9px; padding: 8px 11px; }
    .search:focus-within { border-color: var(--border-hover); }
    .search input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; }
    .search input::placeholder { color: var(--muted-4); }
    .chips { display: flex; gap: 6px; }
    .fchip { font-size: 11.5px; color: var(--muted-3); background: var(--input); border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 10px; cursor: pointer; white-space: nowrap; }
    .fchip:hover { border-color: var(--border-hover); }
    .fchip.on { color: var(--accent-soft); background: #2c2110; border-color: var(--border-active); }

    /* GIF grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .tile { position: relative; border: 1px solid var(--border); background: var(--input); border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: border-color .12s, transform .08s; }
    .tile:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .tile:active { transform: translateY(0); }
    .tile .thumb { width: 100%; aspect-ratio: 1/1; display: block; position: relative;
      background: var(--thumb-bg) center/cover no-repeat;
      background-image:
        linear-gradient(45deg,#241d12 25%,transparent 25%), linear-gradient(-45deg,#241d12 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#241d12 75%), linear-gradient(-45deg,transparent 75%,#241d12 75%);
      background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0; }
    .tile .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; position: relative; z-index: 1; }
    .tile .badge { position: absolute; top: 6px; left: 6px; font-size: 9px; font-weight: 700; letter-spacing: .5px;
      background: rgba(0,0,0,.55); color: #fff; padding: 2px 5px; border-radius: 5px; z-index: 2; }
    .tile .rm { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 6px;
      background: rgba(0,0,0,.6); color: #fff; font-size: 13px; line-height: 18px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity .12s; z-index: 3; }
    .tile:hover .rm { opacity: 1; }
    .tile .rm:hover { background: var(--danger); }
    .tile .cap { padding: 5px 9px 7px; font-size: 11.5px; display: flex; flex-direction: column; gap: 3px; }
    .tile .cap .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .capactions { display: flex; align-items: center; gap: 8px; }
    .capedit { align-self: flex-start; font-size: 10.5px; background: transparent; border: none;
      color: var(--muted); cursor: pointer; padding: 0; display: flex; align-items: center; gap: 3px; }
    .capedit:hover { color: var(--accent); }
    /* per-GIF quick-key chip */
    .keybind { font-size: 10px; line-height: 1; background: var(--input); border: 1px solid var(--border-strong);
      color: var(--muted-3); cursor: pointer; padding: 3px 6px; border-radius: 6px; white-space: nowrap; }
    .keybind:hover { border-color: var(--border-hover); color: var(--text); }
    .keybind.bound { color: var(--accent-soft); background: #2c2110; border-color: var(--border-active); font-weight: 600; }
    .keybind.listening { color: var(--accent); border-color: var(--accent); }
    .tile.missing { opacity: .55; }
    .tile.missing .cap { color: #d56a4a; }
    /* hover "copy" veil */
    .tile .veil { position: absolute; inset: 0; bottom: 30px; display: flex; align-items: center; justify-content: center;
      background: rgba(15,17,23,.55); opacity: 0; transition: opacity .12s; font-size: 12px; font-weight: 600; z-index: 2; }
    .tile:hover .veil { opacity: 1; }
    .tile.copied .veil { opacity: 1; background: rgba(60,45,15,.82); color: #f0d98a; }

    /* add tile */
    .tile.add { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px;
      border-style: dashed; color: var(--muted); aspect-ratio: 1/1; }
    .tile.add:hover { color: var(--accent-soft); }
    .tile.add .plus { font-size: 26px; line-height: 1; }
    .tile.add .lbl { font-size: 11px; }

    /* empty state (hidden while we show samples) */
    .empty { display: none; text-align: center; color: var(--muted); font-size: 12.5px; padding: 40px 0; }

    .btn { padding: 9px 14px; }
    .tile.added { opacity: .7; }
    .tile.added .veil { opacity: 1; background: rgba(60,45,15,.82); color: #f0d98a; }
    /* in-app "From Captures" picker — modal shell shared in theme.css */
    .modal-card { width: 92%; max-width: 640px; max-height: 80vh; overflow: auto; }
    .modal-head { margin-bottom: 12px; position: sticky; top: 0; }

    /* text editor (add captions to an existing GIF) */
    .modal-card.textcard { max-width: 860px; }
    .texteditcenter { text-align: center; margin-bottom: 8px; }
    .texteditwrap { display: inline-block; position: relative; line-height: 0; max-width: 100%;
      border-radius: 10px; overflow: hidden; background: var(--thumb-bg); }
    /* fixed height → every GIF previews at the same size (width follows aspect) */
    .texteditwrap img { height: 56vh; width: auto; max-width: 100%; display: block; }
    .toolrow { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
    .caprow { margin-top: 0; }
    .skrow, .barrow { margin-top: 5px; }
    .toolrow .tip { font-size: 11px; color: var(--muted); }
    .sktray { margin-top: 4px; }
    .tbtn { font-size: 12px; background: var(--btn); color: var(--text); border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 7px 12px; cursor: pointer; }
    .tbtn:hover { border-color: var(--border-hover); }
    .tbtn:disabled { opacity: .5; cursor: default; }
    .tbtn.on { color: var(--accent-soft); background: #2c2110; border-color: var(--border-active); }
    .capinput { flex: 1; min-width: 70px; font-size: 12px; background: var(--input); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px; padding: 6px 9px; }
    .capinput:disabled { opacity: .45; }
    .capcolor { width: 30px; height: 28px; padding: 0; border: 1px solid var(--border-strong);
      border-radius: 7px; background: var(--btn); cursor: pointer; }
    .capcolor:disabled { opacity: .45; }
    .toolrow .spacer { margin-left: auto; }
    .barrow #textHint { font-size: 11px; }
    /* Cancel/Save share the bars row; keep them compact so it stays one line */
    .barrow .btn { padding: 8px 14px; }
  </style>
</head>
<body>
  <header>
    <button class="hbtn" id="homeBtn" title="Back to menu">←</button>
    <h1>GifBoard</h1>
    <span class="step" id="count">— GIFs</span>
  </header>

  <div class="toolbar">
    <div class="search">
      <span style="font-size:13px; color:var(--muted)">⌕</span>
      <input id="search" type="text" placeholder="Search your GIFs…" />
    </div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">No GIFs yet — add one with the buttons below, or “+ Add GIF”.</div>
  </main>

  <footer>
    <span class="muted" id="hint">Click a GIF to copy it — paste anywhere.</span>
    <span class="spacer"></span>
    <button class="btn ghost" id="fromCapturesBtn">From Captures</button>
    <button class="btn ghost" id="importBtn">Import GIF…</button>
  </footer>

  <div class="modal" id="capModal">
    <div class="modal-card">
      <div class="modal-head"><span>Add from Captures</span><button class="x" id="capClose" aria-label="Close">×</button></div>
      <div class="grid" id="capGrid"></div>
    </div>
  </div>

  <div class="modal" id="textModal">
    <div class="modal-card textcard">
      <div class="modal-head"><span>Edit GIF</span><button class="x" id="textClose" aria-label="Close">×</button></div>
      <div class="texteditcenter">
        <div class="texteditwrap" id="textStage">
          <img id="textGif" alt="" draggable="false" />
          <div class="barslayer" id="tBarsLayer">
            <div class="bar top" id="tBarTop"><span class="baredge"></span></div>
            <div class="bar bottom" id="tBarBottom"><span class="baredge"></span></div>
            <div class="bar left" id="tBarLeft"><span class="baredge"></span></div>
            <div class="bar right" id="tBarRight"><span class="baredge"></span></div>
          </div>
          <div class="overlaylayer" id="textOverlay"></div>
        </div>
      </div>
      <div class="toolrow caprow">
        <button class="tbtn" id="tAddCap">＋ Text</button>
        <input class="capinput" id="tCapText" type="text" placeholder="Add text…" disabled />
        <input type="color" class="capcolor" id="tCapColor" value="#ffffff" disabled title="Text color" />
        <button class="tbtn" id="tCapSmaller" disabled title="Smaller">A−</button>
        <button class="tbtn" id="tCapBigger" disabled title="Bigger">A＋</button>
        <button class="tbtn" id="tCapDel" disabled title="Remove this text">✕</button>
      </div>
      <div class="toolrow skrow">
        <button class="tbtn" id="tStickerToggle">＋ Sticker</button>
        <button class="tbtn" id="tSkDel" disabled title="Remove this sticker">✕</button>
        <label class="skopt" title="Lock aspect ratio while resizing"><input type="checkbox" id="tSkUniform" checked /> Uniform</label>
        <span class="layerctl">
          <button class="tbtn" id="tLayerForward" disabled title="Bring selected layer forward">▲</button>
          <button class="tbtn" id="tLayerBack" disabled title="Send selected layer back">▼</button>
        </span>
      </div>
      <div class="sktray" id="tSkTray" style="display:none"></div>
      <div class="toolrow barrow">
        <span class="tip">Bars:</span>
        <button class="tbtn" id="tBarTopBtn" title="Toggle a black bar at the top">▭ Top</button>
        <button class="tbtn" id="tBarBottomBtn" title="Toggle a black bar at the bottom">▭ Bottom</button>
        <button class="tbtn" id="tBarLeftBtn" title="Toggle a black bar on the left">▭ Left</button>
        <button class="tbtn" id="tBarRightBtn" title="Toggle a black bar on the right">▭ Right</button>
        <button class="tbtn" id="tBarEqualBtn" title="Make top/bottom equal and left/right equal">⇿ Equalize</button>
        <span class="muted" id="textHint"></span>
        <span class="spacer"></span>
        <button class="btn ghost" id="textCancel">Cancel</button>
        <button class="btn primary" id="textSave">Save as new GIF</button>
      </div>
    </div>
  </div>

  <script src="soundboard.js"></script>
</body>
</html>
