<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
  <title>GifBoard</title>
  <link rel="stylesheet" href="../fonts.css" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #13100b; color: #ffffff; height: 100vh; display: flex; flex-direction: column;
      user-select: none;
    }
    header { padding: 16px 20px 12px; border-bottom: 1px solid #2a2316; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header .step { margin-left: auto; font-size: 11.5px; color: #9a8c66; }
    .hbtn { background: #271f12; border: 1px solid #473a22; color: #ffffff; border-radius: 8px;
      width: 30px; height: 28px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .hbtn:hover { border-color: #8c6f2e; }

    /* toolbar */
    .toolbar { padding: 12px 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #2a2316; }
    .search { flex: 1; display: flex; align-items: center; gap: 8px; background: #1d1710; border: 1px solid #3a3020;
      border-radius: 9px; padding: 8px 11px; }
    .search:focus-within { border-color: #8c6f2e; }
    .search input { flex: 1; background: transparent; border: none; outline: none; color: #ffffff; font-size: 13px; }
    .search input::placeholder { color: #7c7050; }
    .chips { display: flex; gap: 6px; }
    .fchip { font-size: 11.5px; color: #bdad84; background: #1d1710; border: 1px solid #3a3020;
      border-radius: 7px; padding: 6px 10px; cursor: pointer; white-space: nowrap; }
    .fchip:hover { border-color: #8c6f2e; }
    .fchip.on { color: #e7cf8c; background: #2c2110; border-color: #4e3c1a; }

    main { flex: 1; overflow: auto; padding: 16px 20px; }

    /* GIF grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .tile { position: relative; border: 1px solid #3a3020; background: #1d1710; border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: border-color .12s, transform .08s; }
    .tile:hover { border-color: #8c6f2e; transform: translateY(-1px); }
    .tile:active { transform: translateY(0); }
    .tile .thumb { width: 100%; aspect-ratio: 1/1; display: block; position: relative;
      background: #0b0805 center/cover no-repeat;
      background-image:
        linear-gradient(45deg,#241d12 25%,transparent 25%), linear-gradient(-45deg,#241d12 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#241d12 75%), linear-gradient(-45deg,transparent 75%,#241d12 75%);
      background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0; }
    .tile .thumb img { width: 100%; height: 100%; object-fit: contain; display: block; position: relative; z-index: 1; }
    .tile .badge { position: absolute; top: 6px; left: 6px; font-size: 9px; font-weight: 700; letter-spacing: .5px;
      background: rgba(0,0,0,.55); color: #fff; padding: 2px 5px; border-radius: 5px; z-index: 2; }
    .tile .rm { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 6px;
      background: rgba(0,0,0,.6); color: #fff; font-size: 13px; line-height: 18px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity .12s; z-index: 3; }
    .tile:hover .rm { opacity: 1; }
    .tile .rm:hover { background: #b5362c; }
    .tile .cap { padding: 7px 9px; font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tile.missing { opacity: .55; }
    .tile.missing .cap { color: #d56a4a; }
    /* hover "copy" veil */
    .tile .veil { position: absolute; inset: 0; bottom: 30px; display: flex; align-items: center; justify-content: center;
      background: rgba(15,17,23,.55); opacity: 0; transition: opacity .12s; font-size: 12px; font-weight: 600; z-index: 2; }
    .tile:hover .veil { opacity: 1; }
    .tile.copied .veil { opacity: 1; background: rgba(60,45,15,.82); color: #f0d98a; }

    /* add tile */
    .tile.add { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px;
      border-style: dashed; color: #9a8c66; aspect-ratio: 1/1; }
    .tile.add:hover { color: #e7cf8c; }
    .tile.add .plus { font-size: 26px; line-height: 1; }
    .tile.add .lbl { font-size: 11px; }

    /* empty state (hidden while we show samples) */
    .empty { display: none; text-align: center; color: #9a8c66; font-size: 12.5px; padding: 40px 0; }

    footer { padding: 14px 20px; border-top: 1px solid #2a2316; display: flex; gap: 10px; align-items: center; }
    .muted { font-size: 11.5px; color: #9a8c66; }
    footer .spacer { margin-left: auto; }
    .btn { font-size: 13px; border-radius: 9px; padding: 9px 14px; cursor: pointer; border: 1px solid #473a22; background: #271f12; color: #ffffff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.ghost { background: transparent; }
  </style>
</head>
<body>
  <header>
    <button class="hbtn" id="homeBtn" title="Back to menu">←</button>
    <h1>GifBoard</h1>
    <span class="step" id="count">— GIFs</span>
  </header>

  <div class="toolbar">
    <div class="search">
      <span style="font-size:13px; color:#9a8c66">⌕</span>
      <input id="search" type="text" placeholder="Search your GIFs…" />
    </div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">No GIFs yet — add one with the buttons below, or “+ Add GIF”.</div>
  </main>

  <footer>
    <span class="muted" id="hint">Click a GIF to copy it — paste anywhere.</span>
    <span class="spacer"></span>
    <button class="btn ghost" id="fromCapturesBtn">From Captures</button>
    <button class="btn ghost" id="importBtn">Import GIF…</button>
  </footer>

  <script src="soundboard.js"></script>
</body>
</html>
